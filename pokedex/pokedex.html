<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pokedex</title>

        <link rel="stylesheet" href="pokedex.css">
        <script src="pokedex.js"></script>
    </head>

    <body>
        <div id="content-box">
            <!-- Left side displays pokemon info -->
            <div id="pokemon-info">
                <img id="pokemon-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/494.png">
                <div id="pokemon-types">
                    <span class="type-box psychic">PSYCHIC</span><span class="type-box fire">FIRE</span>
                </div>
                <div id="pokemon-description"></div>
            </div>
            <!-- Right side displays pokemon list -->
            <div id="pokemon-list"></div>
        </div>
    </body>
</html>
